# vim:fileencoding=utf-8:foldmethod=marker
# BEGIN_KITTY_THEME
#include mocha-theme.conf
include alabaster_dark.conf
# END_KITTY_THEME
term xterm-256color
#
font_size 11
#force_ltr yes
#disable_ligatures never
disable_ligatures_in tab cursor 

enable_audio_bell no

background_opacity 1.0 
# BEGIN_KITTY_FONTS
font_family      family="FiraCodeNerd Font"
#font_family      family="Iosevka"
#font_family      family="Hack"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
