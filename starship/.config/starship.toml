#palette = "catppuccin_mocha"

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false 

#format = '''
#пҗІ (bold fg:green) $directory
#'''

format = '''
[в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ>](bold green)
[в”Ӯ](bold green)$time$username$directory$git_branch$git_status
[в””в”Җ>](bold green) '''


[username]
show_always = true
#style_user = "bg:#000000"
#style_user = "bg:#3B4252"
#style_root = "bg:#3B4252"
format = '[ $user ]($style)'

[time]
#style = "bg:#000000"
disabled = false
format = '[$time]($style) '
use_12hr = false
time_format = '%R'
utc_time_offset = 'local'
#style = "bg:#000000"

[directory]
#style = "bg:#434C5E"
#style = "bg:#000000"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[git_branch]
symbol = ''
truncation_length = 6
truncation_symbol = ''

[git_status]
ahead = 'вҮЎ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = 'вҮЈ${count}'

#[character]
#disabled = false 
#success_symbol = '[пҗІ](bold fg:green)'
#error_symbol = '[пҗІ](bold fg:red)'
#vimcmd_symbol = '[пҗҙ](bold fg:creen)'
#vimcmd_replace_one_symbol = '[пҗҙ](bold fg:purple)'
#vimcmd_replace_symbol = '[пҗҙ](bold fg:purple)'
#vimcmd_visual_symbol = '[пҗҙ](bold fg:lavender)'

[directory.substitutions]
"Downloads" = " пҖҷ "
"Pictures" = " пҖҫ "
"Documents" = " п…ӣ "
"Videos" = " пҖҲ "
"Music" = "пҖҒ "

# Disable the package module, hiding it from the prompt completely
[package]
disabled = false

[conda]
symbol = 'рҹ“Ұ'
format = '[$symbol$environment](dimmed green)'

[os]
disabled = true 
style = "bg:surface0 fg:text"

